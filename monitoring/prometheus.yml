global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: "production"
    app: "brightcity"

scrape_configs:

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  - job_name: "brightcity-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"

  # ─── Prometheus itself ────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ─── EC2 System Metrics (Node Exporter) ───────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── Docker Container Metrics (cAdvisor) ──────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
