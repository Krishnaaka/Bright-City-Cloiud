name: CI/CD → ECR

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from GitHub UI

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "700918785571"
  ECR_REGISTRY: 700918785571.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: cloud

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Build & Push Images to ECR ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.vars.outputs.image-tag }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Set image tag
        id: vars
        run: echo "image-tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: 🔐 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & Push Backend ──────────────────────────────────────────────
      - name: 🏗️ Build Backend image
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:backend-$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:backend-latest \
            ./backend

      - name: 📤 Push Backend image to ECR
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:backend-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:backend-latest

      # ── Build & Push Frontend ─────────────────────────────────────────────
      - name: 🏗️ Build Frontend image
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:frontend-$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:frontend-latest \
            ./frontend

      - name: 📤 Push Frontend image to ECR
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:frontend-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:frontend-latest

      - name: ✅ Build Summary
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
        run: |
          echo "### 🐳 Docker Images Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`$ECR_REGISTRY/$ECR_REPO\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`backend-$IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`frontend-$IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next:** SSH into EC2 and run \`docker compose pull && docker compose up -d\`"
