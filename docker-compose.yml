services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: brightcity_user
      POSTGRES_PASSWORD: brightcity_password
      POSTGRES_DB: brightcity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
